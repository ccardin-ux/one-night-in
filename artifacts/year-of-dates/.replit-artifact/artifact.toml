kind = "web"
previewPath = "/"
title = "Year of Dates"
version = "1.0.0"
id = "artifacts/year-of-dates"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20851

[services.development]
run = "pnpm --filter @workspace/year-of-dates run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/year-of-dates", "run", "build" ]
publicDir = "artifacts/year-of-dates/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20851"
BASE_PATH = "/"
